<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Экономика Бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Экран приветствия + авторизации -->
    <div id="auth-screen" class="screen active">
        <div class="header">
            <div class="avatar" id="user-avatar">👤</div>
            <h1 id="welcome-text">Добро пожаловать!</h1>
            <p class="subtitle">Войдите или зарегистрируйтесь, чтобы начать зарабатывать</p>
        </div>

        <div class="form">
            <input type="text" id="custom-name" placeholder="Ваше имя (опционально)" maxlength="20">
            
            <button onclick="handleRegister()" class="btn primary-btn">
                🔑 Зарегистрироваться
            </button>
            
            <button onclick="handleLogin()" class="btn secondary-btn">
                Войти в существующий аккаунт
            </button>
        </div>

        <div class="footer">
            <p>Данные берутся из вашего Telegram-аккаунта</p>
        </div>
    </div>

    <!-- Главный экран (появится после успешной регистрации/входа) -->
    <div id="main-screen" class="screen">
        <div class="header">
            <h2 id="main-welcome">Добро пожаловать обратно!</h2>
        </div>
        
        <div class="balance-card">
            <p>Ваш баланс</p>
            <h3 id="balance">0 💰</h3>
        </div>

        <div class="actions">
            <button onclick="goToShop()" class="btn">🛒 Магазин</button>
            <button onclick="goToProfile()" class="btn">👤 Профиль</button>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
